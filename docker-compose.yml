services:
  db:
    image: postgres:15
    container_name: carparts_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: carparts_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d carparts_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: carparts_api
    restart: always
    env_file:
      - .env
    ports:
      - "3001:3000"
    environment:
      # Overrides host .env so the container talks to Postgres on the Compose network.
      DATABASE_URL: postgresql://admin:password123@db:5432/carparts_db
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "npx prisma migrate deploy && node dist/index.js"]

volumes:
  postgres_data:
